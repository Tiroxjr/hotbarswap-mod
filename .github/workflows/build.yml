name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Autoriser l'exécution de gradlew
        run: chmod +x gradlew

      - name: Compiler le mod
        run: ./gradlew build

      - name: Mettre le .jar à disposition au téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: hotbarswap-mod-jar
          path: build/libs/*.jar
